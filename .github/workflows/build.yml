name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: swift build -c release

      - name: Generate app icon
        run: |
          swift packaging/generate-icon.swift AppIcon.iconset
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Build app bundle
        run: |
          APP_NAME="Privacy Shield.app"
          APP_DIR="dist/${APP_NAME}"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"
          cp packaging/Info.plist "${APP_DIR}/Contents/Info.plist"
          cp AppIcon.icns "${APP_DIR}/Contents/Resources/AppIcon.icns"
          cp .build/release/PrivacyShield "${APP_DIR}/Contents/MacOS/PrivacyShield"
          chmod +x "${APP_DIR}/Contents/MacOS/PrivacyShield"

      - name: Package release artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Privacy Shield.app" "PrivacyShield-macos.zip"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: PrivacyShield-macos.zip
          generate_release_notes: true
