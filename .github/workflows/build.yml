name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.0.4)"
        required: true
        type: string
      release_notes:
        description: "Release notes (optional)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve package dependencies
        run: swift package resolve

      - name: Build
        run: swift build

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build release binary
        run: swift build -c release

      - name: Generate app icon
        run: |
          swift packaging/generate-icon.swift AppIcon.iconset
          iconutil -c icns AppIcon.iconset -o AppIcon.icns

      - name: Build app bundle
        run: |
          APP_NAME="Privacy Shield.app"
          APP_DIR="dist/${APP_NAME}"
          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"
          cp packaging/Info.plist "${APP_DIR}/Contents/Info.plist"
          cp AppIcon.icns "${APP_DIR}/Contents/Resources/AppIcon.icns"
          cp .build/release/PrivacyShield "${APP_DIR}/Contents/MacOS/PrivacyShield"
          chmod +x "${APP_DIR}/Contents/MacOS/PrivacyShield"

      - name: Ad-hoc code sign
        run: |
          codesign --sign - --deep --force --options runtime "dist/Privacy Shield.app"

      - name: Package release artifact
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/Privacy Shield.app" "PrivacyShield-macos.zip"

      - name: Create tag (manual release only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Privacy Shield ${{ steps.version.outputs.tag }}"
          body: ${{ github.event.inputs.release_notes }}
          files: PrivacyShield-macos.zip
          generate_release_notes: ${{ github.event.inputs.release_notes == '' }}

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA256=$(shasum -a 256 PrivacyShield-macos.zip | awk '{print $1}')
          VERSION=${{ steps.version.outputs.version }}

          git clone https://x-access-token:${{ secrets.TAP_TOKEN }}@github.com/daliuchen/homebrew-privacy-shield.git tap
          cd tap

          cat > Casks/privacy-shield.rb << EOF
          cask "privacy-shield" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/daliuchen/privacy-shield/releases/download/v${VERSION}/PrivacyShield-macos.zip"
            name "Privacy Shield"
            desc "macOS menu bar app that covers all displays with a privacy overlay"
            homepage "https://github.com/daliuchen/privacy-shield"

            app "Privacy Shield.app"

            zap trash: [
              "~/Library/Preferences/com.daliuchen.privacyshield.plist",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/privacy-shield.rb
          git commit -m "chore: update privacy-shield to v${VERSION}"
          git push
